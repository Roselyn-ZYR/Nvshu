<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Digital Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #FAF6F2;
            --ink-main: #2C2C2C;
            --rouge: #B03A38;
            --petal: #E8D3D1;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            margin: 0;
            font-family: 'PingFang SC', 'STHeiti', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(176, 58, 56, 0.02) 0%, transparent 70%);
        }

        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-title {
            font-family: 'NvshuSerif', serif !important;
            font-size: clamp(60px, 10vw, 110px); 
            color: var(--rouge);
            margin: 0;
            line-height: 1.2;
        }

        .sub-title {
            margin-top: 15px;
            letter-spacing: 10px;
            color: #4A4A4A;
            font-size: 1.3rem;
            font-weight: 300;
        }

        .lang-en {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #999;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .vision-section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--petal);
            border-radius: 60px;
            max-width: 520px;
            margin: 0 auto 80px;
            padding: 30px;
            text-align: center;
        }

        /* 详情面板样式 */
        #detail-panel {
            display: none;
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(250, 246, 242, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--petal);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(176, 58, 56, 0.1);
            z-index: 1001;
            animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-40%) scale(0.9); }
            to { opacity: 1; transform: translateY(-50%) scale(1); }
        }

        #detail-char { font-family: 'NvshuSerif'; font-size: 120px; color: var(--rouge); margin-bottom: 20px; }
        #detail-cn { font-size: 24px; font-weight: 400; margin: 10px 0; }
        #detail-desc { font-size: 14px; line-height: 1.8; color: #666; text-align: justify; margin-top: 20px; }

        footer {
            margin-top: 180px; /* 增加留白过渡 */
            padding: 80px 20px;
            text-align: center;
            font-size: 11px;
            color: #AAA;
            letter-spacing: 1px;
            line-height: 2.2;
            border-top: 1px solid rgba(176, 58, 56, 0.05);
        }

        #p5-container { width: 100%; display: flex; justify-content: center; cursor: pointer; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-paper); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">
    <div style="color:var(--rouge); letter-spacing:4px;">Opening Archive...</div>
</div>

<div id="detail-panel">
    <div onclick="this.parentElement.style.display='none'" style="cursor:pointer; float:right; color:#AAA;">✕</div>
    <div id="detail-char"></div>
    <div id="detail-cn"></div>
    <div id="detail-en-de" style="color:#B03A38; font-size:14px; opacity:0.7;"></div>
    <div id="detail-desc"></div>
</div>

<header>
    <div class="main-title">&#x1B18C;&#x1B1B9;</div>
    <div class="sub-title">数字档案馆<span class="lang-en">Digital Archive</span></div>
</header>

<div class="vision-section">
    <div style="font-size:1rem; color:#666; margin-bottom:20px; letter-spacing:3px;">
        识图寻踪<span class="lang-en" style="font-size:0.65rem;">Image Recognition</span>
    </div>
    <button class="upload-btn" style="background:linear-gradient(135deg, var(--rouge), #D67A78); color:white; border:none; padding:12px 45px; border-radius:35px; cursor:pointer; letter-spacing:2px;" onclick="alert('Recognition System Initializing...')">UPLOAD IMAGE</button>
</div>

<div id="p5-container"></div>

<footer>
    Thanks to the support from the<br>
    <strong>Frauenförderfonds</strong> of Bauhaus-Universität Weimar.
</footer>

<script>
    let nushuFont;
    let nushuData = [];
    let chars = [];
    let cols = 26; 
    let rows = 16;

    function preload() {
        nushuFont = loadFont('fonts/NyushuSerif-1.000.ttf', () => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 800);
        });
        // 尝试加载数据文件
        nushuData = loadJSON('nushu_data.json');
    }

    function setup() {
        let w = min(windowWidth * 0.95, 1200);
        let cnv = createCanvas(w, 850);
        cnv.parent('p5-container');
        if (nushuFont) textFont(nushuFont);
        textAlign(CENTER, CENTER);
        for (let i = 0; i < 416; i++) {
            chars.push(String.fromCodePoint(0x1B170 + i));
        }
    }

    function draw() {
        clear();
        let cellSizeW = width / cols;
        let cellSizeH = height / rows;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let tx = x * cellSizeW + cellSizeW/2;
                let ty = y * cellSizeH + cellSizeH/2;
                let d = dist(mouseX, mouseY, tx, ty);
                let n = noise(x * 0.1, y * 0.1, frameCount * 0.012);
                let off = map(d, 0, 280, 25, 0, true);
                let fx = tx + cos(n * TWO_PI) * off;
                let fy = ty + sin(n * TWO_PI) * off;
                fill(176, 58, 56, map(d, 0, 400, 255, 35, true));
                textSize(min(cellSizeW, cellSizeH) * 0.85);
                let idx = y * cols + x;
                if (idx < chars.length) text(chars[idx], fx, fy);
            }
        }
    }

    function mousePressed() {
        let cellSizeW = width / cols;
        let cellSizeH = height / rows;
        let x = floor(mouseX / cellSizeW);
        let y = floor(mouseY / cellSizeH);
        let idx = y * cols + x;

        if (idx >= 0 && idx < 416 && mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
            let hexID = (0x1B170 + idx).toString(16).toUpperCase();
            showDetail(hexID, chars[idx]);
        }
    }

    function showDetail(id, char) {
        let entry = Object.values(nushuData).find(item => item.id === id);
        document.getElementById('detail-char').innerText = char;
        document.getElementById('detail-cn').innerText = entry ? entry.meaning_cn : "未收录";
        document.getElementById('detail-en-de').innerText = entry ? `${entry.meaning_en} / ${entry.meaning_de}` : "Data Pending";
        document.getElementById('detail-desc').innerText = entry ? entry.description : "该字符的详细释义正在根据赵丽明教授《女书规范字书法字帖》校对中。";
        document.getElementById('detail-panel').style.display = 'block';
    }

    function windowResized() {
        resizeCanvas(min(windowWidth * 0.95, 1200), 850);
    }
</script>
</body>
</html>
