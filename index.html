<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>女书数字档案馆 | Nüshu Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
        }

        :root {
            --bg-paper: #F9F5F1;  /* 宣纸感暖白 */
            --ink-dark: #2C2C2C;  /* 墨黑 */
            --rouge: #A62C2B;     /* 胭脂红 */
            --petal: #E8D3D1;     /* 浅粉黛 */
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-dark);
            margin: 0;
            font-family: 'NvshuSerif', serif;
            transition: background 0.5s;
        }

        /* 艺术化页头：去除阴间感 */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 40px;
        }

        .title-wrapper {
            position: relative;
            text-align: center;
        }

        h1 {
            font-size: clamp(60px, 8vw, 100px);
            margin: 0;
            color: var(--rouge);
            font-weight: 300;
            letter-spacing: 20px;
            /* 模拟印章的凹凸感 */
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            line-height: 1.2;
        }

        .sub-title {
            font-size: 14px;
            letter-spacing: 8px;
            color: #999;
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* 识图区：精致且柔和 */
        .upload-section {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            border: 1px dashed var(--petal);
            border-radius: 40px;
            margin: 20px auto;
            max-width: 600px;
            padding: 30px;
            text-align: center;
        }

        .upload-btn {
            border: none;
            background: var(--rouge);
            padding: 12px 35px;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(166, 44, 43, 0.2);
            transition: 0.3s;
        }

        .upload-btn:hover {
            transform: scale(1.05);
            background: #8E2C2A;
        }

        #p5-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<header>
    <div class="title-wrapper">
        <h1>女书</h1>
        <div style="font-size: 32px; letter-spacing: 12px; color: #555; margin-top:-10px;">数字档案馆</div>
        <div class="sub-title">— Nüshu Digital Archive —</div>
    </div>
</header>

<div class="upload-section">
    <div style="margin-bottom: 15px; font-size: 13px; color: #888;">视觉识别：上传一张包含女书的图片，AI 将为你寻回对应的数字字符</div>
    <input type="file" id="img-upload" hidden accept="image/*">
    <button class="upload-btn" onclick="document.getElementById('img-upload').click()">识图寻踪</button>
</div>

<div id="p5-container"></div>

<script>
    let myFont;
    let nushuChars = [];
    let cols = 22; 
    let rows = 18;
    let baseCode = 0x1B170;

    function preload() {
        myFont = loadFont('fonts/NyushuSerif-1.000.ttf');
    }

    function setup() {
        // 画布大小根据窗口动态调整
        let w = min(windowWidth * 0.9, 1000);
        let cnv = createCanvas(w, 800);
        cnv.parent('p5-container');
        textFont(myFont);
        textAlign(CENTER, CENTER);
        
        for (let i = 0; i < 400; i++) {
            nushuChars.push(String.fromCodePoint(baseCode + i));
        }
    }

    function draw() {
        clear(); // 保持背景透明，使用 CSS 的背景色
        
        let cellSize = width / cols;
        
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let tx = x * cellSize + cellSize/2;
                let ty = y * cellSize + cellSize/2;
                
                let d = dist(mouseX, mouseY, tx, ty);
                
                // 液体波动效果
                let noiseVal = noise(x * 0.1, y * 0.1, frameCount * 0.01);
                let offset = map(d, 0, 250, 15, 0, true);
                
                let finalX = tx + cos(noiseVal * TWO_PI) * offset;
                let finalY = ty + sin(noiseVal * TWO_PI) * offset;
                
                // 配色：远距离为淡灰色，鼠标靠近变为胭脂红
                let r = map(d, 0, 200, 166, 80, true);
                let g = map(d, 0, 200, 44, 80, true);
                let b = map(d, 0, 200, 43, 80, true);
                let alpha = map(d, 0, 300, 255, 40, true);
                
                fill(r, g, b, alpha);
                textSize(cellSize * 0.7);
                
                let index = y * cols + x;
                if (index < nushuChars.length) {
                    text(nushuChars[index], finalX, finalY);
                }
            }
        }
    }

    function windowResized() {
        let w = min(windowWidth * 0.9, 1000);
        resizeCanvas(w, 800);
    }
</script>

</body>
</html>
