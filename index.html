<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        /* 1. 注册字体：请确保文件夹已更名为 fonts */
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #FAF6F2;  /* 柔和宣纸色 */
            --ink-main: #333333;  /* 暖墨色 */
            --rouge: #B03A38;     /* 胭脂红 */
            --petal: #F2E3E1;     /* 浅粉 */
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(176, 58, 56, 0.03) 0%, transparent 70%);
        }

        /* 艺术化页头 */
        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-title {
            /* 强制对标题使用女书字体 */
            font-family: 'NvshuSerif', serif !important;
            font-size: clamp(80px, 15vw, 160px);
            color: var(--rouge);
            margin: 0;
            line-height: 1;
            filter: drop-shadow(0 4px 8px rgba(176, 58, 56, 0.1));
        }

        .sub-title {
            margin-top: 15px;
            letter-spacing: 12px;
            color: #555;
            font-size: 1.4rem;
            font-weight: 300;
        }

        /* 识图功能区 */
        .vision-section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--petal);
            border-radius: 60px;
            max-width: 500px;
            margin: 0 auto 50px;
            padding: 30px;
            text-align: center;
        }

        .vision-text {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        .vision-en {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--rouge), #D67A78);
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .upload-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(176, 58, 56, 0.2);
        }

        #p5-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* 加载遮罩 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-paper);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="color:var(--rouge); letter-spacing:5px;">正在铺展卷轴...</div>
</div>

<header>
    <div class="main-title">&#x1B18C;&#x1B1B9;</div>
    <div class="sub-title">数字档案馆</div>
</header>

<div class="vision-section">
    <div class="vision-text">
        识图寻踪
        <span class="vision-en">IMAGE RECOGNITION</span>
    </div>
    <input type="file" id="img-input" hidden accept="image/*">
    <button class="upload-btn" onclick="document.getElementById('img-input').click()">选择图片</button>
</div>

<div id="p5-container"></div>

<script>
    let nushuFont;
    let chars = [];
    let cols = 22; 
    let rows = 18;

    function preload() {
        // 加载字体
        nushuFont = loadFont('fonts/NyushuSerif-1.000.ttf', () => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').remove(), 800);
        });
    }

    function setup() {
        let w = min(windowWidth * 0.95, 1100);
        let cnv = createCanvas(w, 800);
        cnv.parent('p5-container');
        if (nushuFont) textFont(nushuFont);
        textAlign(CENTER, CENTER);
        
        for (let i = 0; i < 400; i++) {
            chars.push(String.fromCodePoint(0x1B170 + i));
        }
    }

    function draw() {
        clear();
        let cellSize = width / cols;
        let limit = 260;

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let tx = x * cellSize + cellSize/2;
                let ty = y * cellSize + cellSize/2;
                
                let d = dist(mouseX, mouseY, tx, ty);
                let n = noise(x * 0.12, y * 0.12, frameCount * 0.012);
                let off = map(d, 0, limit, 20, 0, true);
                
                let fx = tx + cos(n * TWO_PI) * off;
                let fy = ty + sin(n * TWO_PI) * off;
                
                let r = map(d, 0, limit, 176, 120, true);
                let g = map(d, 0, limit, 58, 120, true);
                let b = map(d, 0, limit, 56, 120, true);
                let a = map(d, 0, 400, 255, 40, true);
                
                fill(r, g, b, a);
                textSize(cellSize * 0.75);
                
                let idx = y * cols + x;
                if (idx < chars.length) text(chars[idx], fx, fy);
            }
        }
    }

    function windowResized() {
        let w = min(windowWidth * 0.95, 1100);
        resizeCanvas(w, 800);
    }
</script>

</body>
</html>
