<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Digital Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #FAF6F2;
            --ink-main: #2C2C2C;
            --rouge: #B03A38;
            --petal: #E8D3D1;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            margin: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(176, 58, 56, 0.02) 0%, transparent 70%),
                              url('data:image/svg+xml;utf8,<svg width="4" height="4" viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg"><rect width="4" height="4" fill="none"/><circle cx="2" cy="2" r="0.5" fill="%23D1BFAe" opacity="0.1"/></svg>');
        }

        /* 强行切断 Canvas 调用系统默认汉字字体的后路 */
        canvas {
            font-family: 'NvshuSerif' !important;
        }

        header {
            height: 35vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .main-title {
            font-family: 'NvshuSerif', serif !important;
            font-size: clamp(80px, 12vw, 120px); 
            color: var(--rouge);
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 5px 15px rgba(176, 58, 56, 0.1);
        }

        .sub-title {
            margin-top: 15px;
            letter-spacing: 10px;
            color: #4A4A4A;
            font-size: 1.5rem;
            font-weight: 300;
        }

        .lang-en {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #999;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .control-section {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--petal);
            border-radius: 50px;
            max-width: 500px;
            margin: 0 auto 30px;
            padding: 25px 35px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        #nushu-search {
            width: 90%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--petal);
            background: rgba(255,255,255,0.8);
            outline: none;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s;
        }
        #nushu-search:focus {
            border-color: var(--rouge);
            box-shadow: 0 0 15px rgba(176, 58, 56, 0.1);
        }

        #detail-panel {
            display: none;
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(250, 246, 242, 0.98);
            backdrop-filter: blur(25px);
            border: 1px solid var(--petal);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(176, 58, 56, 0.15);
            z-index: 1001;
            max-height: 85vh;
            overflow-y: auto;
        }

        #detail-char { font-family: 'NvshuSerif'; font-size: 110px; color: var(--rouge); text-align: center; line-height: 1.1; }
        .detail-label { font-size: 10px; color: #AAA; letter-spacing: 2px; margin-top: 25px; text-transform: uppercase; }
        #detail-meaning { font-size: 26px; color: var(--ink-main); margin: 5px 0; }

        #artist-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed var(--petal);
            animation: fadeIn 1s;
        }
        .artist-img { width: 100%; border-radius: 15px; filter: grayscale(1); transition: 0.5s; margin-top: 10px; }
        .artist-img:hover { filter: grayscale(0); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer {
            margin-top: 60px; 
            padding: 80px 20px;
            text-align: center;
            font-size: 11px;
            color: #BBB;
            letter-spacing: 1px;
            line-height: 2;
            border-top: 1px solid rgba(176, 58, 56, 0.05);
            position: relative;
            z-index: 10;
        }

        #p5-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            cursor: crosshair; 
            position: relative;
            z-index: 1;
        }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-paper); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s; }
    </style>
</head>
<body>

<div style="font-family: 'NvshuSerif' !important; position: absolute; visibility: hidden; pointer-events: none;">
    &#x1B170;&#x1B17A;&#x1B180;&#x1B181;&#x1B182;&#x1B22C;
</div>

<div id="loading">
    <div style="color:var(--rouge); letter-spacing:4px;">ARCHIVE LOADING...</div>
</div>

<div id="detail-panel">
    <div onclick="this.parentElement.style.display='none'" style="cursor:pointer; float:right; color:#AAA; font-size:20px;">✕</div>
    <div id="detail-char"></div>
    <div class="detail-label">Meanings / 含义</div>
    <div id="detail-meaning"></div>
    <div id="detail-langs" style="color:#B03A38; font-size:14px; margin-top:5px; font-style: italic;"></div>
    <div class="detail-label">Context / 应用</div>
    <div id="detail-desc" style="font-size:13px; line-height:1.6; color:#666;"></div>

    <div id="artist-box">
        <div class="detail-label" style="color:var(--rouge)">✨ Creative Power / 艺术力量</div>
        <img id="artist-img" class="artist-img" src="" alt="Artist">
        <div id="artist-name" style="font-weight: bold; margin-top: 10px;"></div>
        <div id="artist-bio" style="font-size: 12px; color: #888; margin-top: 5px; line-height: 1.4;"></div>
    </div>
</div>

<header>
    <div class="main-title">&#x1B181;&#x1B22C;</div>
    <div class="sub-title">数字档案馆<span class="lang-en">Nüshu Digital Archive</span></div>
</header>

<div class="control-section">
    <div style="font-size:0.85rem; color:#888; letter-spacing:3px; margin-bottom:12px;">搜索索引 / SEARCH INDEX</div>
    <input type="text" id="nushu-search" placeholder="输入汉字、拼音或英文 (Search / Suche)...">
</div>

<div id="p5-container"></div>

<footer>
    Supported by <strong>Frauenförderfonds</strong> of Bauhaus-Universität Weimar<br>
    Media Architecture Project
</footer>

<script>
    let nushuData = [], chars = [];
    let cols = 24, rows = 17; 
    let searchQuery = "";
    let particles = [];

    function preload() {
        // 彻底移除了 loadFont，防止 P5.js 的底层解析器将复杂的字体结构算错并扭曲
        loadJSON('nushu_data.json', (data) => { nushuData = data; });
    }

    function setup() {
        let w = min(windowWidth * 0.95, 1200);
        let cnv = createCanvas(w, 1350); 
        cnv.parent('p5-container');
        
        // 强制使用系统原生的字体渲染引擎
        textFont('NvshuSerif'); 
        textAlign(CENTER, CENTER);
        
        for (let i = 0; i < 396; i++) {
            chars.push(String.fromCodePoint(0x1B170 + i));
        }

        for(let i = 0; i < 250; i++){ particles.push(new Particle()); }

        // 等待浏览器的底层把真实的矢量字体下载并处理完毕，再关闭加载动画
        if (document.fonts) {
            document.fonts.ready.then(function() {
                let loading = document.getElementById('loading');
                if(loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 800);
                }
            });
        } else {
            setTimeout(() => {
                let loading = document.getElementById('loading');
                if(loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 800);
                }
            }, 1500);
        }
    }

    function draw() {
        clear();
        
        let padX = 40;
        let padY = 80; 
        let drawW = width - padX * 2;
        let drawH = height - padY * 2;
        
        let cellSizeW = drawW / cols;
        let cellSizeH = drawH / rows;

        for(let i = 0; i < particles.length; i++){
            particles[i].update();
            particles[i].display();
        }

        let closestIndex = -1;
        let minDistance = 999999;
        
        for (let i = 0; i < chars.length; i++) {
            let x = i % cols, y = floor(i / cols);
            let tx = padX + x * cellSizeW + cellSizeW / 2;
            let ty = padY + y * cellSizeH + cellSizeH / 2;
            let d = dist(mouseX, mouseY, tx, ty);
            if (d < minDistance) {
                minDistance = d;
                closestIndex = i;
            }
        }
        
        let activeDrawParams = null;

        for (let i = 0; i < chars.length; i++) {
            let x = i % cols;
            let y = floor(i / cols);
            
            let tx = padX + x * cellSizeW + cellSizeW / 2;
            let ty = padY + y * cellSizeH + cellSizeH / 2;
            let d = dist(mouseX, mouseY, tx, ty);
            let hexID = (0x1B170 + i).toString(16).toUpperCase();
            
            let isSearchMatch = false;
            if (searchQuery.length > 0 && nushuData.length > 0) {
                let entry = Object.values(nushuData).find(item => item.id === hexID);
                if (entry && (entry.meaning_cn.includes(searchQuery) || 
                   (entry.meaning_en && entry.meaning_en.toLowerCase().includes(searchQuery)) ||
                   (entry.meaning_de && entry.meaning_de.toLowerCase().includes(searchQuery)))) {
                    isSearchMatch = true;
                }
            }

            let n = noise(x * 0.1, y * 0.1, frameCount * 0.005);
            
            if (i === closestIndex && minDistance < cellSizeW * 1.5 && mouseX > 0 && mouseY > 0) {
                activeDrawParams = { char: chars[i], tx: tx, ty: ty, hexID: hexID, isSearchMatch: isSearchMatch };
                continue; 
            }

            push(); 
            textFont('NvshuSerif'); // 每一帧都强制锁死字体引擎
            
            if (isSearchMatch) {
                fill(176, 58, 56);
                textSize(cellSizeW * 1.15); 
            } else if (d < 350 && mouseX > 0 && mouseY > 0) {
                let proximitySize = map(d, 0, 350, cellSizeW * 1.15, cellSizeW * 0.85);
                let proximityAlpha = map(d, 0, 350, 240, 70);
                fill(176, 58, 56, proximityAlpha);
                textSize(proximitySize);
            } else {
                fill(176, 58, 56, 45);
                textSize(cellSizeW * 0.85);
            }

            let drift = map(d, 0, 350, 15, 0, true);
            // 强行把浮点数坐标转换为整数，这是杜绝字体拉伸扭曲的关键防线
            let finalX = Math.round(tx + cos(n * TWO_PI) * drift);
            let finalY = Math.round(ty + sin(n * TWO_PI) * drift);
            
            text(chars[i], finalX, finalY);
            pop(); 
        }

        if (activeDrawParams) {
            push();
            textFont('NvshuSerif'); 
            fill(176, 58, 56, 255); 
            textSize(cellSizeW * 1.55); 
            
            drawingContext.shadowBlur = 25; 
            drawingContext.shadowColor = 'rgba(176, 58, 56, 0.6)';
            
            text(activeDrawParams.char, activeDrawParams.tx, activeDrawParams.ty);
            pop();
        }
    }

    function mousePressed() {
        let padX = 40, padY = 80;
        let drawW = width - padX * 2, drawH = height - padY * 2;
        let cellSizeW = drawW / cols, cellSizeH = drawH / rows;
        
        for (let i = 0; i < chars.length; i++) {
            let x = i % cols, y = floor(i / cols);
            let tx = padX + x * cellSizeW + cellSizeW / 2;
            let ty = padY + y * cellSizeH + cellSizeH / 2;
            
            if (dist(mouseX, mouseY, tx, ty) < cellSizeW / 1.2) {
                let hexID = (0x1B170 + i).toString(16).toUpperCase();
                showDetail(hexID, chars[i]);
                break;
            }
        }
    }

    function showDetail(id, char) {
        let entry = Object.values(nushuData).find(item => item.id === id);
        document.getElementById('detail-char').innerText = char;
        document.getElementById('detail-meaning').innerText = entry ? entry.meaning_cn : "待整理";
        document.getElementById('detail-langs').innerText = entry ? `${entry.meaning_en} / ${entry.meaning_de || '-'}` : "U+" + id;
        document.getElementById('detail-desc').innerText = entry ? (entry.description || "Digital Archive processing.") : "Archiving details from Zhao Liming's Nushu Guide.";
        
        let artistBox = document.getElementById('artist-box');
        if (entry && entry.artist) {
            artistBox.style.display = 'block';
            document.getElementById('artist-name').innerText = entry.artist.name;
            document.getElementById('artist-bio').innerText = entry.artist.bio;
            document.getElementById('artist-img').src = entry.artist.image_url || "";
        } else {
            artistBox.style.display = 'none';
        }
        
        document.getElementById('detail-panel').style.display = 'block';
    }

    function windowResized() {
        resizeCanvas(min(windowWidth * 0.95, 1200), 1350);
    }

    class Particle {
        constructor() {
            this.x = random(width);
            this.y = random(height);
            this.vx = random(-0.2, 0.2);
            this.vy = random(-0.4, 0.1); 
            this.size = random(0.5, 2.5);
            this.alpha = random(40, 130);
        }

        update() {
            let n = noise(this.x * 0.005, this.y * 0.005, frameCount * 0.002);
            let angle = n * TWO_PI * 2;
            
            let d = dist(mouseX, mouseY, this.x, this.y);
            if(d < 150 && mouseX > 0 && mouseY > 0) {
                let force = map(d, 0, 150, 0.5, 0);
                this.x -= (mouseX - this.x) * force * 0.01;
                this.y -= (mouseY - this.y) * force * 0.01;
            }

            this.x += cos(angle) * 0.5 + this.vx;
            this.y += sin(angle) * 0.5 + this.vy;

            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }

        display() {
            noStroke();
            fill(209, 191, 174, this.alpha);
            ellipse(this.x, this.y, this.size);
        }
    }
</script>
</body>
</html>
