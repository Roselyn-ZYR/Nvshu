<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Digital Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #FAF6F2;
            --ink-main: #2C2C2C;
            --rouge: #B03A38;
            --petal: #E8D3D1;
            --dark-grey: #333333;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            margin: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(176, 58, 56, 0.02) 0%, transparent 70%);
        }

        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 标题：根据指正修改“书”字编码 */
        .main-title {
            font-family: 'NvshuSerif', serif !important;
            font-size: clamp(80px, 12vw, 120px); 
            color: var(--rouge);
            margin: 0;
            line-height: 1.2;
        }

        .sub-title {
            margin-top: 15px;
            letter-spacing: 10px;
            color: #4A4A4A;
            font-size: 1.5rem;
            font-weight: 300;
        }

        .lang-en {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #999;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* 搜索与识图区 */
        .control-section {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid var(--petal);
            border-radius: 50px;
            max-width: 650px;
            margin: 0 auto 50px;
            padding: 40px;
            text-align: center;
        }

        .input-wrapper { margin-bottom: 25px; }

        #nushu-search {
            width: 85%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--petal);
            background: white;
            outline: none;
            font-size: 14px;
        }

        .upload-btn {
            background: var(--dark-grey);
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 12px;
            transition: 0.3s;
        }

        /* 详情面板 */
        #detail-panel {
            display: none;
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(250, 246, 242, 0.98);
            backdrop-filter: blur(25px);
            border: 1px solid var(--petal);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            z-index: 1001;
        }

        #detail-char { font-family: 'NvshuSerif'; font-size: 130px; color: var(--rouge); text-align: center; }
        .detail-label { font-size: 10px; color: #AAA; letter-spacing: 2px; margin-top: 25px; text-transform: uppercase; }
        #detail-meaning { font-size: 26px; color: var(--ink-main); margin: 5px 0; }

        /* 截图风格致谢：深灰背景，竖向文字排版 */
        footer {
            background-color: var(--dark-grey);
            color: #FFFFFF;
            padding: 60px 20px;
            text-align: left;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-content {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        #p5-container { width: 100%; display: flex; justify-content: center; cursor: crosshair; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-paper); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">
    <div style="color:var(--rouge); letter-spacing:4px;">ARCHIVE LOADING...</div>
</div>

<div id="detail-panel">
    <div onclick="this.parentElement.style.display='none'" style="cursor:pointer; float:right; color:#AAA;">✕</div>
    <div id="detail-char"></div>
    <div class="detail-label">Meanings / 含义</div>
    <div id="detail-meaning"></div>
    <div id="detail-langs" style="color:#B03A38; font-size:14px; margin-top:5px;"></div>
    <div class="detail-label">Notes / 注解</div>
    <div id="detail-desc" style="font-size:13px; line-height:1.6; color:#666;"></div>
</div>

<header>
    <div class="main-title">&#x1B181;&#x1B172;</div>
    <div class="sub-title">数字档案馆<span class="lang-en">Nüshu Digital Archive</span></div>
</header>

<div class="control-section">
    <div class="input-wrapper">
        <div style="font-size:0.8rem; color:#888; letter-spacing:3px; margin-bottom:12px;">搜索索引 / SEARCH INDEX</div>
        <input type="text" id="nushu-search" placeholder="输入汉字、拼音或英文 (Chinese / Pinyin / English)...">
    </div>
    
    <div style="border-top: 1px solid #EEE; padding-top: 25px;">
        <div style="font-size:0.8rem; color:#888; letter-spacing:3px; margin-bottom:12px;">识图寻踪 / IMAGE RECOGNITION</div>
        <input type="file" id="img-upload" hidden accept="image/*">
        <button class="upload-btn" onclick="document.getElementById('img-upload').click()">UPLOAD IMAGE</button>
    </div>
</div>

<div id="p5-container"></div>

<footer>
    <div class="footer-content">
        Thanks to the support from<br>
        Frauenförderfonds of Bauhaus-Universität Weimar.
    </div>
</footer>

<script>
    let nushuFont, nushuData = [], chars = [];
    let cols = 22, rows = 18; 
    let searchQuery = "";

    function preload() {
        nushuFont = loadFont('fonts/NyushuSerif-1.000.ttf', () => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 800);
        });
        nushuData = loadJSON('nushu_data.json');
    }

    function setup() {
        let w = min(windowWidth * 0.9, 1100);
        let cnv = createCanvas(w, 850);
        cnv.parent('p5-container');
        if (nushuFont) textFont(nushuFont);
        textAlign(CENTER, CENTER);
        for (let i = 0; i < 396; i++) {
            chars.push(String.fromCodePoint(0x1B170 + i));
        }
        document.getElementById('nushu-search').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
        });
    }

    function draw() {
        clear();
        let cellSizeW = width / cols;
        let cellSizeH = height / rows;
        for (let i = 0; i < chars.length; i++) {
            let x = i % cols;
            let y = floor(i / cols);
            let tx = x * cellSizeW + cellSizeW/2;
            let ty = y * cellSizeH + cellSizeH/2;
            let d = dist(mouseX, mouseY, tx, ty);
            let hexID = (0x1B170 + i).toString(16).toUpperCase();
            
            let isHighlight = false;
            if (searchQuery.length > 0) {
                let entry = Object.values(nushuData).find(item => item.id === hexID);
                if (entry && (entry.meaning_cn.includes(searchQuery) || 
                   (entry.meaning_en && entry.meaning_en.toLowerCase().includes(searchQuery)) ||
                   (entry.meaning_de && entry.meaning_de.toLowerCase().includes(searchQuery)))) {
                    isHighlight = true;
                }
            }

            let n = noise(x * 0.1, y * 0.1, frameCount * 0.01);
            let off = map(d, 0, 250, 15, 0, true);
            
            if (isHighlight) {
                fill(var(--rouge));
                textSize(cellSizeW * 1.1);
            } else {
                fill(176, 58, 56, map(d, 0, 350, 255, 40, true));
                textSize(cellSizeW * 0.85);
            }
            text(chars[i], tx + cos(n * TWO_PI) * off, ty + sin(n * TWO_PI) * off);
        }
    }

    function mousePressed() {
        let cellSizeW = width / cols;
        let cellSizeH = height / rows;
        for (let i = 0; i < chars.length; i++) {
            let x = i % cols, y = floor(i / cols);
            let tx = x * cellSizeW + cellSizeW/2, ty = y * cellSizeH + cellSizeH/2;
            if (dist(mouseX, mouseY, tx, ty) < cellSizeW/2) {
                let hexID = (0x1B170 + i).toString(16).toUpperCase();
                showDetail(hexID, chars[i]);
                break;
            }
        }
    }

    function showDetail(id, char) {
        let entry = Object.values(nushuData).find(item => item.id === id);
        document.getElementById('detail-char').innerText = char;
        document.getElementById('detail-meaning').innerText = entry ? entry.meaning_cn : "Data Pending";
        document.getElementById('detail-langs').innerText = entry ? `${entry.meaning_en} / ${entry.meaning_de}` : "U+" + id;
        document.getElementById('detail-desc').innerText = entry ? entry.description : "Archiving information from Professor Zhao Liming's calligraphy guide.";
        document.getElementById('detail-panel').style.display = 'block';
    }

    function windowResized() {
        resizeCanvas(min(windowWidth * 0.9, 1100), 850);
    }
</script>
</body>
</html>
