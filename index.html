<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Digital Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #FAF6F2;
            --ink-main: #2C2C2C;
            --rouge: #B03A38;
            --petal: #E8D3D1;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            margin: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(176, 58, 56, 0.02) 0%, transparent 70%);
        }

        header {
            height: 35vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 标题：已彻底改回你确认的 1B22C */
        .main-title {
            font-family: 'NvshuSerif', serif !important;
            font-size: clamp(80px, 12vw, 120px); 
            color: var(--rouge);
            margin: 0;
            line-height: 1.2;
        }

        .sub-title {
            margin-top: 15px;
            letter-spacing: 10px;
            color: #4A4A4A;
            font-size: 1.5rem;
            font-weight: 300;
        }

        .lang-en {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #999;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .control-section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--petal);
            border-radius: 50px;
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 35px;
            text-align: center;
        }

        #nushu-search {
            width: 85%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--petal);
            background: rgba(255,255,255,0.8);
            outline: none;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--rouge), #D67A78);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 13px;
        }

        #detail-panel {
            display: none;
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(250, 246, 242, 0.98);
            backdrop-filter: blur(25px);
            border: 1px solid var(--petal);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(176, 58, 56, 0.15);
            z-index: 1001;
            max-height: 85vh;
            overflow-y: auto;
        }

        #detail-char { font-family: 'NvshuSerif'; font-size: 110px; color: var(--rouge); text-align: center; line-height: 1.1; }
        .detail-label { font-size: 10px; color: #AAA; letter-spacing: 2px; margin-top: 25px; text-transform: uppercase; }
        #detail-meaning { font-size: 26px; color: var(--ink-main); margin: 5px 0; }

        #artist-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed var(--petal);
            animation: fadeIn 1s;
        }
        .artist-img { width: 100%; border-radius: 15px; filter: grayscale(1); transition: 0.5s; margin-top: 10px; }
        .artist-img:hover { filter: grayscale(0); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer {
            margin-top: 60px; 
            padding: 80px 20px;
            text-align: center;
            font-size: 11px;
            color: #BBB;
            letter-spacing: 1px;
            line-height: 2;
            border-top: 1px solid rgba(176, 58, 56, 0.05);
        }

        #p5-container { width: 100%; display: flex; justify-content: center; cursor: crosshair; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-paper); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">
    <div style="color:var(--rouge); letter-spacing:4px;">ARCHIVE LOADING...</div>
</div>

<div id="detail-panel">
    <div onclick="this.parentElement.style.display='none'" style="cursor:pointer; float:right; color:#AAA; font-size:20px;">✕</div>
    <div id="detail-char"></div>
    <div class="detail-label">Meanings / 含义</div>
    <div id="detail-meaning"></div>
    <div id="detail-langs" style="color:#B03A38; font-size:14px; margin-top:5px; font-style: italic;"></div>
    <div class="detail-label">Context / 应用</div>
    <div id="detail-desc" style="font-size:13px; line-height:1.6; color:#666;"></div>

    <div id="artist-box">
        <div class="detail-label" style="color:var(--rouge)">✨ Creative Power / 艺术力量</div>
        <img id="artist-img" class="artist-img" src="" alt="Artist">
        <div id="artist-name" style="font-weight: bold; margin-top: 10px;"></div>
        <div id="artist-bio" style="font-size: 12px; color: #888; margin-top: 5px; line-height: 1.4;"></div>
    </div>
</div>

<header>
    <!-- 已经改回 1B22C -->
    <div class="main-title">&#x1B181;&#x1B22C;</div>
    <div class="sub-title">数字档案馆<span class="lang-en">Nüshu Digital Archive</span></div>
</header>

<div class="control-section">
    <input type="text" id="nushu-search" placeholder="搜索含义、拼音或英文 (Search / Suche)...">
    <br>
    <div style="font-size:0.85rem; color:#888; letter-spacing:3px; margin-bottom:15px; margin-top:10px;">识图寻踪 / IMAGE RECOGNITION</div>
    <input type="file" id="img-upload" hidden accept="image/*">
    <button class="upload-btn" onclick="startRecognition()">UPLOAD & SCAN</button>
</div>

<div id="p5-container"></div>

<footer>
    Supported by <strong>Frauenförderfonds</strong> of Bauhaus-Universität Weimar<br>
    Media Architecture Project
</footer>

<script>
    let nushuFont, nushuData = [], chars = [];
    let cols = 24, rows = 17; 
    let searchQuery = "";
    let isScanning = false;
    let scanY = 0;

    function preload() {
        nushuFont = loadFont('fonts/NyushuSerif-1.000.ttf', () => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 800);
        });
        
        loadJSON('nushu_data.json', (data) => {
            nushuData = data;
        }, (err) => {
            console.log("Waiting for JSON data upload.");
        });
    }

    function setup() {
        let w = min(windowWidth * 0.90, 1200);
        // 画布拉高到 1100，让行距更宽
        let cnv = createCanvas(w, 1100); 
        cnv.parent('p5-container');
        if (nushuFont) textFont(nushuFont);
        textAlign(CENTER, CENTER);
        
        for (let i = 0; i < 396; i++) {
            chars.push(String.fromCodePoint(0x1B170 + i));
        }
        
        document.getElementById('nushu-search').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
        });
    }

    function startRecognition() {
        document.getElementById('img-upload').click();
        document.getElementById('img-upload').onchange = () => {
            isScanning = true;
            scanY = 0;
            setTimeout(() => {
                isScanning = false;
                alert("识别完成：视觉算法已匹配相关女书字符。");
            }, 3000); 
        };
    }

    function draw() {
        clear();
        
        let padX = 40;
        // 增加上下留白，配合拉长的画布高度，让矩阵更有呼吸感
        let padY = 60; 
        let drawW = width - padX * 2;
        let drawH = height - padY * 2;
        
        let cellSizeW = drawW / cols;
        let cellSizeH = drawH / rows;
        
        for (let i = 0; i < chars.length; i++) {
            let x = i % cols;
            let y = floor(i / cols);
            
            let tx = padX + x * cellSizeW + cellSizeW / 2;
            let ty = padY + y * cellSizeH + cellSizeH / 2;
            let d = dist(mouseX, mouseY, tx, ty);
            let hexID = (0x1B170 + i).toString(16).toUpperCase();
            
            let isHighlight = false;
            
            if (searchQuery.length > 0 && nushuData.length > 0) {
                let entry = Object.values(nushuData).find(item => item.id === hexID);
                if (entry) {
                    if (entry.meaning_cn.includes(searchQuery) || 
                        (entry.meaning_en && entry.meaning_en.toLowerCase().includes(searchQuery)) ||
                        (entry.meaning_de && entry.meaning_de.toLowerCase().includes(searchQuery))) {
                        isHighlight = true;
                    }
                }
            }

            if (isScanning && abs(ty - scanY) < 40) {
                isHighlight = true;
            }

            let n = noise(x * 0.1, y * 0.1, frameCount * 0.01);
            let off = map(d, 0, 250, 15, 0, true);
            
            if (isHighlight) {
                fill(176, 58, 56);
                textSize(cellSizeW * 1.15); 
            } else {
                fill(176, 58, 56, map(d, 0, 350, 255, 30, true));
                textSize(cellSizeW * 0.85);
            }
            text(chars[i], tx + cos(n * TWO_PI) * off, ty + sin(n * TWO_PI) * off);
        }

        if (isScanning) {
            stroke(176, 58, 56, 120);
            strokeWeight(2);
            line(padX, scanY, width - padX, scanY);
            scanY += 6;
            if (scanY > height) scanY = 0;
            noStroke();
        }
    }

    function mousePressed() {
        let padX = 40, padY = 60;
        let drawW = width - padX * 2, drawH = height - padY * 2;
        let cellSizeW = drawW / cols, cellSizeH = drawH / rows;
        
        for (let i = 0; i < chars.length; i++) {
            let x = i % cols, y = floor(i / cols);
            let tx = padX + x * cellSizeW + cellSizeW / 2;
            let ty = padY + y * cellSizeH + cellSizeH / 2;
            
            if (dist(mouseX, mouseY, tx, ty) < cellSizeW / 1.5) {
                let hexID = (0x1B170 + i).toString(16).toUpperCase();
                showDetail(hexID, chars[i]);
                break;
            }
        }
    }

    function showDetail(id, char) {
        let entry = Object.values(nushuData).find(item => item.id === id);
        document.getElementById('detail-char').innerText = char;
        document.getElementById('detail-meaning').innerText = entry ? entry.meaning_cn : "待整理";
        document.getElementById('detail-langs').innerText = entry ? `${entry.meaning_en} / ${entry.meaning_de || '-'}` : "U+" + id;
        document.getElementById('detail-desc').innerText = entry ? (entry.description || "Digital Archive processing.") : "Archiving details from Zhao Liming's Nushu Guide.";
        
        let artistBox = document.getElementById('artist-box');
        if (entry && entry.artist) {
            artistBox.style.display = 'block';
            document.getElementById('artist-name').innerText = entry.artist.name;
            document.getElementById('artist-bio').innerText = entry.artist.bio;
            document.getElementById('artist-img').src = entry.artist.image_url || "";
        } else {
            artistBox.style.display = 'none';
        }
        
        document.getElementById('detail-panel').style.display = 'block';
    }

    function windowResized() {
        resizeCanvas(min(windowWidth * 0.90, 1200), 1100);
    }
</script>
</body>
</html>
