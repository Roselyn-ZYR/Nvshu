<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        /* 1. 注册本地字体：确保路径指向你仓库中的 fonts 文件夹 */
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #F9F5F1;  /* 宣纸感暖白 */
            --ink-dark: #2C2C2C;  /* 墨黑 */
            --rouge: #A62C2B;     /* 胭脂红 */
            --petal: #E8D3D1;     /* 浅粉黛 */
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-dark);
            margin: 0;
            font-family: 'NvshuSerif', serif;
            overflow-x: hidden;
            /* 增加一个非常淡的宣纸底纹效果 */
            background-image: radial-gradient(circle at 50% 50%, rgba(166, 44, 43, 0.015) 0%, transparent 80%);
        }

        /* 艺术化页头 */
        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .title-container {
            text-align: center;
            position: relative;
        }

        /* 这里的“女书”二字将直接显示为女书字符 */
        .main-title {
            font-family: 'NvshuSerif', sans-serif;
            font-size: clamp(80px, 12vw, 150px);
            margin: 0;
            color: var(--rouge);
            font-weight: normal;
            line-height: 1;
            /* 模拟印泥在纸张上的晕染微光 */
            filter: drop-shadow(0 4px 6px rgba(166, 44, 43, 0.15));
            letter-spacing: 10px;
        }

        .sub-title-cn {
            font-size: 24px;
            letter-spacing: 12px;
            color: #555;
            margin-top: 10px;
            font-weight: 300;
        }

        .sub-title-en {
            font-size: 12px;
            letter-spacing: 6px;
            color: #AAA;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* 识图功能区：更柔和的女性化UI */
        .upload-section {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid var(--petal);
            border-radius: 50px;
            margin: 0 auto 40px;
            max-width: 500px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(232, 211, 209, 0.2);
        }

        .upload-btn {
            border: none;
            background: linear-gradient(135deg, var(--rouge), #D98B8A);
            padding: 12px 40px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(166, 44, 43, 0.3);
        }

        #p5-container {
            width: 100%;
            display: flex;
            justify-content: center;
            background: transparent;
        }

        /* 加载动画：解决你提到的 Loading 卡死感 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-paper);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="color:var(--rouge); letter-spacing:4px; font-size:14px;">正在开启档案馆...</div>
</div>

<header>
    <div class="title-container">
        <h1 class="main-title">𡝌𡝹</h1>
        <div class="sub-title-cn">数字档案馆</div>
        <div class="sub-title-en">Nüshu Digital Archive</div>
    </div>
</header>

<div class="upload-section">
    <div style="margin-bottom: 12px; font-size: 13px; color: #999;">识图寻踪：上传原件图片识别对应字符</div>
    <input type="file" id="img-upload" hidden accept="image/*">
    <button class="upload-btn" onclick="document.getElementById('img-upload').click()">选择图片</button>
</div>

<div id="p5-container"></div>

<script>
    let myFont;
    let nushuChars = [];
    let cols = 22; 
    let rows = 18;
    let baseCode = 0x1B170;

    function preload() {
        // 关键：确保路径指向你刚刚整理好的 fonts 文件夹
        myFont = loadFont('fonts/NyushuSerif-1.000.ttf', 
            () => { document.getElementById('loading-overlay').style.opacity = '0'; 
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 1000); },
            (err) => { console.error("字体加载失败", err); }
        );
    }

    function setup() {
        let w = min(windowWidth * 0.95, 1100);
        let cnv = createCanvas(w, 750);
        cnv.parent('p5-container');
        if (myFont) textFont(myFont);
        textAlign(CENTER, CENTER);
        
        for (let i = 0; i < 400; i++) {
            nushuChars.push(String.fromCodePoint(baseCode + i));
        }
    }

    function draw() {
        clear(); // 保持背景透明，透出宣纸色
        
        let cellSize = width / cols;
        let mouseDistLimit = 250;
        
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let tx = x * cellSize + cellSize/2;
                let ty = y * cellSize + cellSize/2;
                
                let d = dist(mouseX, mouseY, tx, ty);
                
                // 液体波动算法 (来自你的 Processing 原型)
                let noiseVal = noise(x * 0.12, y * 0.12, frameCount * 0.012);
                let offset = map(d, 0, mouseDistLimit, 18, 0, true);
                
                let finalX = tx + cos(noiseVal * TWO_PI) * offset;
                let finalY = ty + sin(noiseVal * TWO_PI) * offset;
                
                // 颜色平滑转换：远距离淡灰，近距离胭脂红
                let r = map(d, 0, mouseDistLimit, 166, 120, true);
                let g = map(d, 0, mouseDistLimit, 44, 120, true);
                let b = map(d, 0, mouseDistLimit, 43, 120, true);
                let alpha = map(d, 0, 400, 255, 30, true);
                
                fill(r, g, b, alpha);
                textSize(cellSize * 0.75);
                
                let index = y * cols + x;
                if (index < nushuChars.length) {
                    text(nushuChars[index], finalX, finalY);
                }
            }
        }
    }

    function windowResized() {
        let w = min(windowWidth * 0.95, 1100);
        resizeCanvas(w, 750);
    }
</script>

</body>
</html>
