<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书数字档案馆 | Nüshu Digital Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        @font-face {
            font-family: 'NvshuSerif';
            src: url('fonts/NyushuSerif-1.000.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-paper: #FAF6F2;
            --ink-main: #2C2C2C;
            --rouge: #B03A38;
            --petal: #F2E3E1;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            margin: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(176, 58, 56, 0.02) 0%, transparent 70%);
        }

        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-family: 'NvshuSerif', serif !important;
            font-size: clamp(60px, 10vw, 110px); 
            color: var(--rouge);
            margin: 0;
            line-height: 1.2;
        }

        .sub-title {
            margin-top: 15px;
            letter-spacing: 10px;
            color: #4A4A4A;
            font-size: 1.3rem;
            font-weight: 300;
        }

        .lang-en {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #999;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* 交互式详情卡片 */
        #detail-card {
            display: none;
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--petal);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(176, 58, 56, 0.1);
            z-index: 1001;
            transition: all 0.5s ease;
        }

        #detail-char { font-family: 'NvshuSerif'; font-size: 100px; color: var(--rouge); margin-bottom: 15px; }
        .detail-label { font-size: 12px; color: #AAA; letter-spacing: 2px; margin-top: 15px; }
        #detail-meaning { font-size: 22px; margin: 5px 0; color: var(--ink-main); }

        /* 识图功能区 */
        .vision-section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--petal);
            border-radius: 60px;
            max-width: 520px;
            margin: 0 auto 100px;
            padding: 30px;
            text-align: center;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--rouge), #D67A78);
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 35px;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        footer {
            margin-top: 200px;
            padding: 80px 20px;
            text-align: center;
            font-size: 11px;
            color: #AAA;
            letter-spacing: 1px;
            line-height: 2;
        }

        #p5-container { width: 100%; display: flex; justify-content: center; cursor: crosshair; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-paper); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">
    <div style="color:var(--rouge); letter-spacing:4px;">Opening Archive...</div>
</div>

<div id="detail-card">
    <div onclick="this.parentElement.style.display='none'" style="cursor:pointer; float:right; color:#AAA;">✕</div>
    <div id="detail-char"></div>
    <div class="detail-label">MEANING / BEDEUTUNG</div>
    <div id="detail-meaning"></div>
    <div id="detail-lang" style="color:#B03A38; font-size:14px; margin-bottom:15px;"></div>
    <div class="detail-label">USAGE / GEBRAUCH</div>
    <div id="detail-desc" style="font-size:14px; line-height:1.6; color:#666; text-align:justify;"></div>
</div>

<header>
    <div class="main-title">&#x1B18C;&#x1B1B9;</div>
    <div class="sub-title">数字档案馆<span class="lang-en">Digital Archive</span></div>
</header>

<div class="vision-section">
    <div style="font-size:1rem; color:#666; margin-bottom:20px; letter-spacing:3px;">
        识图寻踪<span class="lang-en" style="font-size:0.65rem;">Image Recognition</span>
    </div>
    <button class="upload-btn" onclick="alert('Digital Vision System Initializing...')">UPLOAD IMAGE</button>
</div>

<div id="p5-container"></div>

<footer>
    Thanks to the support from the<br>
    <strong>Frauenförderfonds</strong> of Bauhaus-Universität Weimar.
</footer>

<script>
    let nushuFont;
    let nushuData = [];
    let chars = [];
    let cols = 26; 
    let rows = 16;

    function preload() {
        nushuFont = loadFont('fonts/NyushuSerif-1.000.ttf', () => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 800);
        });
        // 自动读取 JSON 数据库
        nushuData = loadJSON('nushu_data.json');
    }

    function setup() {
        let w = min(windowWidth * 0.95, 1200);
        let cnv = createCanvas(w, 850);
        cnv.parent('p5-container');
        if (nushuFont) textFont(nushuFont);
        textAlign(CENTER, CENTER);
        for (let i = 0; i < 416; i++) {
            chars.push(String.fromCodePoint(0x1B170 + i));
        }
    }

    function draw() {
        clear();
        let cellSizeW = width / cols;
        let cellSizeH = height / rows;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let tx = x * cellSizeW + cellSizeW/2;
                let ty = y * cellSizeH + cellSizeH/2;
                let d = dist(mouseX, mouseY, tx, ty);
                let n = noise(x * 0.1, y * 0.1, frameCount * 0.012);
                let off = map(d, 0, 280, 25, 0, true);
                fill(176, 58, 56, map(d, 0, 400, 255, 35, true));
                textSize(min(cellSizeW, cellSizeH) * 0.85);
                let idx = y * cols + x;
                if (idx < chars.length) text(chars[idx], tx + cos(n * TWO_PI) * off, ty + sin(n * TWO_PI) * off);
            }
        }
    }

    function mousePressed() {
        let cellSizeW = width / cols;
        let cellSizeH = height / rows;
        let x = floor(mouseX / cellSizeW);
        let y = floor(mouseY / cellSizeH);
        let idx = y * cols + x;

        if (idx >= 0 && idx < 416 && mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
            let hexID = (0x1B170 + idx).toString(16).toUpperCase();
            showDetail(hexID, chars[idx]);
        }
    }

    function showDetail(id, char) {
        let entry = Object.values(nushuData).find(item => item.id === id);
        document.getElementById('detail-char').innerText = char;
        document.getElementById('detail-meaning').innerText = entry ? entry.meaning_cn : "正在校对 / Pending";
        document.getElementById('detail-lang').innerText = entry ? `${entry.meaning_en} / ${entry.meaning_de}` : "U+" + id;
        document.getElementById('detail-desc').innerText = entry ? entry.description : "根据赵丽明《女书规范字书法字帖》正在同步数字化资料。";
        document.getElementById('detail-card').style.display = 'block';
    }

    function windowResized() {
        resizeCanvas(min(windowWidth * 0.95, 1200), 850);
    }
</script>
</body>
</html>
